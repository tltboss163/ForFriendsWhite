import requests
import base64
import time
from flask import Flask, Response

app = Flask(__name__)

# Ссылки на источники (можно добавить несколько через запятую)
SOURCES = [
    "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt",
    "https://raw.githubusercontent.com/zieng2/wl/main/vless_universal.txt"
]

def generate_subscription():
    unique_configs = set()
    
    for url in SOURCES:
        try:
            print(f"[{time.strftime('%H:%M:%S')}] Загрузка: {url}")
            r = requests.get(url, timeout=15)
            r.raise_for_status()
            
            # Очистка и фильтрация
            for line in r.text.splitlines():
                line = line.strip()
                # Берем только строки, начинающиеся на протоколы (vless, ss, trojan)
                if line.startswith(('vless://', 'ss://', 'trojan://', 'vmess://')):
                    unique_configs.add(line)
                    
        except Exception as e:
            print(f"Ошибка при работе с {url}: {e}")

    # Склеиваем всё в один текст с переносом строки
    final_text = "\n".join(list(unique_configs))
    
    # Считаем количество для лога в консоль
    print(f"[{time.strftime('%H:%M:%S')}] Собрано серверов: {len(unique_configs)}")
    
    # Для клиентов (v2rayNG и т.д.) кодируем в Base64
    # Если Remnawave ругается на Base64, можно возвращать final_text напрямую
    encoded_data = base64.b64encode(final_text.encode('utf-8')).decode('utf-8')
    return encoded_data

@app.route('/sub')
def sub_route():
    data = generate_subscription()
    if not data:
        return "No servers found", 404
    return Response(data, mimetype='text/plain')

if __name__ == "__main__":
    # Запускаем. Порт 8080.
    app.run(host='0.0.0.0', port=8080)
